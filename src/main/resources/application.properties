spring.application.name=demo

spring.datasource.url = jdbc:postgresql://localhost:5432/bshop_jpa_utf8
spring.datasource.username = postgres
spring.datasource.password = 1234
spring.datasource.driver-class-name=org.postgresql.Driver

# update - update the database schema on startup
# create - creates the database schema on startup, destroying previous data
# create-drop - creates the database schema on startup and drops it on shutdown
# validate - validates the database schema, makes no changes to the database
# none - does nothing with the database schema
spring.jpa.hibernate.ddl-auto=create

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.encoding=UTF-8

spring.messages.basename=messages
spring.messages.encoding=UTF-8

stripe.secret.key = #
stripe.public.key = #
stripe.webhook.secret = #

novapost.api.key = #

app.domain = https://overweak-zaire-vaunted.ngrok-free.dev
app.upload.dir=#

# Налаштування для HTTP клієнта
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# Таймаути для RestTemplate (опціонально)
spring.mvc.async.request-timeout=10000

