spring.application.name=demo

spring.datasource.url = jdbc:postgresql://dpg-d74goom3jp1c7392q35g-a/bshop_jpa_utf8
spring.datasource.username = bshop_admin
spring.datasource.password = ${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# update - update the database schema on startup
# create - creates the database schema on startup, destroying previous data
# create-drop - creates the database schema on startup and drops it on shutdown
# validate - validates the database schema, makes no changes to the database
# none - does nothing with the database schema
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.sql.init.encoding=UTF-8

logging.level.root=WARN
logging.level.com.bshop_jpa=INFO

spring.messages.basename=messages
spring.messages.encoding=UTF-8

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

stripe.secret.key =${STRIPE_SECRET_KEY}
stripe.public.key = ${STRIPE_PUBLIC_KEY}
stripe.webhook.secret = ${STRIPE_WEBHOOK_SECRET}

google.maps.api.key=${GOOGLE_API_KEY}

novapost.api.key = ${NOVAPOST_API_KEY}
novapost.api.url = https://api.novaposhta.ua/v2.0/json/

app.admin.email = ${APP_ADMIN_EMAIL}
app.admin.email2 = ${APP_ADMIN_EMAIL2}

app.domain = ${APP_DOMAIN}
app.upload.dir=${APP_UPLOAD_DIR}
app.delete.dir=/app/

# Налаштування для HTTP клієнта
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.port=${SERVER_PORT}

spring.mail.host = smtp.gmail.com
spring.mail.port = 587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth = true
spring.mail.properties.mail.smtp.starttls.enable=true

# Таймаути для RestTemplate (опціонально)
spring.mvc.async.request-timeout=10000

