<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{address.selectLocker}">Wybierz Punkt Odbioru w Polsce</title>
    <link rel="stylesheet" th:href="@{/css/pickup-points.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1 th:text="#{address.selectLocker}">Wybierz Punkt Odbioru Przesyłki</h1>
            <p class="description" th:text="#{address.selectLockerSmall}">Znajdź najbliższy punkt odbioru</p>
        </header>
        
        <div class="content">
            <div class="map-container">
                <div id="map"></div>
            </div>
            
            <div class="form-container">
                <div class="form-group">
                    <label for="city-search" th:text="#{address.city}">Miasto:</label>
                    <input type="text" id="city-search" placeholder="Wpisz miasto" value="Warszawa">
                </div>
                
                <div class="form-group">
                    <label th:text="#{address.selectLockerSmall}">Wybierz usługę dostawy:</label>
                    <div class="delivery-service">
                        <div class="service-btn active" data-service="inpost">InPost</div>
                        <div class="service-btn" data-service="novapost">Nova Post</div>
                        <div class="service-btn" data-service="poczta">Poczta Polska</div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label th:text="#{address.availableLockers}">Dostępne punkty odbioru:</label>
                    <div class="pickup-points" id="points-list">
                        <div class="loading">Ładowanie punktów InPost...</div>
                    </div>
                </div>

                <!-- Форма для авторизованных пользователей -->
                <form sec:authorize="isAuthenticated()" 
                      id="lockerForm" 
                      method="post" 
                      th:action="@{/order/address/submit}">
                    <input type="hidden" id="lockerId" name="lockerId">
                    <input type="hidden" id="lockerName" name="lockerName">
                    <input type="hidden" id="lockerAddress" name="lockerAddress">
                </form>

                <!-- Форма для анонимных пользователей -->
                <form sec:authorize="isAnonymous()" 
                      id="lockerForm" 
                      method="post" 
                      th:action="@{/order/address/unauthorized/submit}">
                    <input type="hidden" id="sizeId" name="sizeId" th:value="${sizeId}">
                    <input type="hidden" id="productId" name="productId" th:value="${productId}">
                    <input type="hidden" id="quantity" name="quantity" th:value="${quantity}">
                    <input type="hidden" id="email" name="email" th:value="${email}">
                    
                    <input type="hidden" id="lockerId" name="lockerId">
                    <input type="hidden" id="lockerName" name="lockerName">
                    <input type="hidden" id="lockerAddress" name="lockerAddress">
                </form>
                
                <button class="btn" id="select-btn" disabled>
                    <span th:text="#{address.submitDisabled}">Wybierz punkt odbioru</span>
                </button>
            </div>
        </div>
    </div>

<!-- Подключаем внешний JavaScript -->
<script th:src="@{/js/pickup-points.js}"></script>

<script async defer
    th:src="@{'https://maps.googleapis.com/maps/api/js?key=' + ${googleMapsKey} + '&callback=initMap'}">
</script>
    
</body>
</html>
