<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{address.selectLocker}">Виберіть відділення</title>
    <link rel="stylesheet" th:href="@{/css/pickup-points.css}">
    <style>
        /* Дополнительные стили для полноэкранного режима */
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        
        .container {
            max-width: 1200px;
            margin: 20px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            min-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: #dc143c;
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-radius: 10px 10px 0 0;
        }
        
        .content {
            flex: 1;
            padding: 30px;
        }
        
        .form-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .pickup-points {
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                min-height: calc(100vh - 20px);
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 th:text="#{address.selectLocker}">Виберіть відділення доставки</h1>
            <p class="description" th:text="#{address.selectLockerSmall}">Введіть місто та оберіть зручне відділення</p>
        </header>
        
        <div class="content">
            <div class="form-container">
                
                <!-- Индикатор службы доставки -->
                <div id="service-indicator" style="display: none;" class="service-indicator"></div>
                
                <!-- Поиск по городу -->
                <!-- Поиск по городу -->
<div class="form-group">
    <label for="city-search" class="form-label">Місто:</label>

    <input type="text"
           id="city-search"
           class="form-control form-control-lg"
           placeholder="Київ, Варшава, Краків..."
           autocomplete="off">
</div>

<!-- Улица -->
<div class="form-group">
    <label for="street-search" class="form-label">
        Вулиця (необов'язково)
    </label>

    <input type="text"
           id="street-search"
           class="form-control form-control-lg"
           placeholder="Marszałkowska або Хрещатик"
           autocomplete="off">
</div>

<!-- Номер отделения / пачкомата -->
<div class="form-group">
    <label for="number-search" class="form-label">
        № відділення / пачкомату (необов'язково)
    </label>

    <input type="text"
           id="number-search"
           class="form-control form-control-lg"
           placeholder="Наприклад: 25 або APM123"
           autocomplete="off">
</div>

<!-- Список отделений -->
<div class="form-group">
    <label class="form-label">
        Доступні відділення
    </label>

    <div class="pickup-points" id="points-list">
        <div class="loading">
            Почніть вводити місто для пошуку
        </div>
    </div>
</div>

                <!-- Формы (скрытые) -->
                <form sec:authorize="isAuthenticated()" 
                      id="lockerForm" 
                      method="post" 
                      th:action="@{/order/address/submit}">
                    <input type="hidden" id="lockerId" name="lockerId">
                    <input type="hidden" id="lockerName" name="lockerName">
                    <input type="hidden" id="lockerAddress" name="lockerAddress">
                </form>

                <form sec:authorize="isAnonymous()" 
                      id="lockerFormAnon" 
                      method="post" 
                      th:action="@{/order/address/unauthorized/submit}">
                    <input type="hidden" id="sizeId" name="sizeId" th:value="${sizeId}">
                    <input type="hidden" id="productId" name="productId" th:value="${productId}">
                    <input type="hidden" id="quantity" name="quantity" th:value="${quantity}">
                    <input type="hidden" id="email" name="email" th:value="${email}">
                    
                    <input type="hidden" id="lockerIdAnon" name="lockerId">
                    <input type="hidden" id="lockerNameAnon" name="lockerName">
                    <input type="hidden" id="lockerAddressAnon" name="lockerAddress">
                </form>
                
                <!-- Кнопка выбора -->
                <button class="btn btn-success btn-lg btn-block" id="select-btn" disabled>
                    <span th:text="#{address.submitDisabled}">Виберіть відділення</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Подключаем JavaScript -->
    <script th:src="@{/js/pickup-points.js}"></script>
    
</body>
</html>
