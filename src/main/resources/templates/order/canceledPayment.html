<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{canceledPayment.cardTitle}">Platność anulowana</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/store.css}">

    <style>
        body {
            background-color: #f8d7da;
        }
        .cancel-card {
            max-width: 550px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 12px;
            background-color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .emoji {
            font-size: 58px;
        }
    </style>
</head>

<body>

<header class="header">
    <div class="container header-inner">
        <div class="logo">🛍 MyStore</div>

        <button class="nav-toggle" th:attr="aria-label=#{page.menu}" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>

        <nav class="nav">
            <div class="lang-switcher">
                <div class="dropdown">
                    <button class="dropbtn">
                        🌐 <span th:text="${#locale.language == 'uk' ? 'UA' : #locale.language.toUpperCase()}">PL</span>
                    </button>
                    <div class="dropdown-content">
                        <a href="#" onclick="changeLanguage('uk'); return false;">UA</a>
                        <a href="#" onclick="changeLanguage('pl'); return false;">PL</a>
                    </div>
                </div>
            </div>

            <a th:href="@{/}" th:text="#{page.home}">Главная</a>
            <a th:href="@{/store}" th:text="#{page.catalog}">Каталог</a>
            <a th:href="@{/about}" th:text="#{page.about}">О нас</a>
            <a th:href="@{/contacts}" th:text="#{page.contacts}">Контакты</a>

            <a sec:authorize="isAuthenticated()" th:href="@{/store/cart}" th:text="#{page.cart}">Корзина</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/order/myorders}" th:text="#{page.myOrdersPage}">Мои заказы</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/auth/logout}" method="post" style="display:inline;">
                <button class="btn-small danger" type="submit" th:text="#{page.logout}">Выйти</button>
            </form>

            <a sec:authorize="isAnonymous()" th:href="@{/login}" th:text="#{page.login}">Войти</a>
        </nav>
    </div>
</header>
<main class="container">
<div class="cancel-card text-center">
    <div class="emoji">❌</div>
    <h2 th:text="#{canceledPayment.cardTitle}">Płatność anulowana</h2>
    <p class="mt-3" th:text="#{canceledPayment.text1}">
        Transakcja została anulowana lub płatność nie powiodła się.
    </p>

    <p class="text-muted" th:text="#{canceledPayment.text2}">
        Jeśli to był błąd, możesz spróbować ponownie.
    </p>

    <a href="/" class="btn btn-danger mt-3" th:text="#{canceledPayment.submit}">Powrót do strony głównej</a>
</div>
</main>

<footer class="footer">
    <p th:text="#{page.copyright}"></p>
</footer>
<script th:src="@{/js/mobile-nav.js}"></script>
</body>
</html>
