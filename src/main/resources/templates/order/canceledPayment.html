<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Platność anulowana</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f8d7da;
        }
        .cancel-card {
            max-width: 550px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 12px;
            background-color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .emoji {
            font-size: 58px;
        }
    </style>
</head>
<body>

<div class="cancel-card text-center">
    <div class="emoji">❌</div>
    <h2>Płatność anulowana</h2>
    <p class="mt-3">
        Transakcja została anulowana lub płatność nie powiodła się.
    </p>

    <p class="text-muted">
        Jeśli to był błąd, możesz spróbować ponownie.
    </p>

    <a href="/" class="btn btn-danger mt-3">Powrót do strony głównej</a>
</div>

</body>
</html>
