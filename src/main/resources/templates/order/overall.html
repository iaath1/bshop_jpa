<!DOCTYPE html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Podsumowanie zamówienia</title>

    <script src="https://js.stripe.com/v3/"></script>
    <link rel="stylesheet" th:href="@{/css/store.css}">

    <style>
        .checkout-container {
            max-width: 1000px;
            margin: 20px auto;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,.08);
            overflow: hidden;
        }

        h2 {
            padding: 25px;
            border-bottom: 1px solid #eee;
            margin: 0;
            font-size: 26px;
        }

        .section {
            padding: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-weight: 600;
            color: #666;
            border-bottom: 2px solid #eee;
            padding-bottom: 12px;
        }

        td {
            padding: 16px 0;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }

        .product {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .product img {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid #ddd;
        }

        .price {
            font-weight: 600;
        }

        .total-box {
            text-align: right;
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
        }

        .address-box {
            background: #f8f9fc;
            padding: 18px;
            border-radius: 10px;
            border: 1px solid #e3e6f0;
            font-size: 15px;
        }

        .pay-box {
            padding: 25px;
            border-top: 1px solid #eee;
        }

        .btn-pay {
            width: 100%;
            background: linear-gradient(135deg, #6772E5, #5469D4);
            color: #fff;
            padding: 16px;
            font-size: 20px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform .1s, box-shadow .1s;
        }

        .btn-pay:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(103,114,229,.4);
        }

        .secure {
            margin-top: 10px;
            font-size: 13px;
            color: #777;
            text-align: center;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .product img { width: 55px; height: 55px; }
        }
    </style>
</head>

<body>
<header class="header">
    <div class="container header-inner">
        <div class="logo">🛍 MyStore</div>

        <button class="nav-toggle" th:attr="aria-label=#{page.menu}" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>

        <nav class="nav">
            <div class="lang-switcher">
                <div class="dropdown">
                    <button class="dropbtn">
                        🌐 <span th:text="${#locale.language == 'uk' ? 'UA' : #locale.language.toUpperCase()}">PL</span>
                    </button>
                    <div class="dropdown-content">
                        <a href="#" onclick="changeLanguage('uk'); return false;">UA</a>
                        <a href="#" onclick="changeLanguage('pl'); return false;">PL</a>
                    </div>
                </div>
            </div>

            <a th:href="@{/}" th:text="#{page.home}">Главная</a>
            <a th:href="@{/store}" th:text="#{page.catalog}">Каталог</a>
            <a th:href="@{/about}" th:text="#{page.about}">О нас</a>
            <a th:href="@{/contacts}" th:text="#{page.contacts}">Контакты</a>

            <a sec:authorize="isAuthenticated()" th:href="@{/store/cart}" th:text="#{page.cart}">Корзина</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/order/myorders}" th:text="#{page.myOrdersPage}">Мои заказы</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/auth/logout}" method="post" style="display:inline;">
                <button class="btn-small danger" type="submit" th:text="#{page.logout}">Выйти</button>
            </form>

            <a sec:authorize="isAnonymous()" th:href="@{/login}" th:text="#{page.login}">Войти</a>
        </nav>
    </div>
</header>
<main class="container checkout-page">

<div class="checkout-container">

    <h2 th:text="#{overall.cardTitle}">🧾 Podsumowanie zamówienia</h2>

    <!-- ===== PRODUCTS ===== -->
    <div class="section">
        <table>
            <thead>
            <tr>
                <th th:text="#{overall.productCol}">Produkt</th>
                <th th:text="#{overall.quantityCol}">Ilość</th>
                <th th:text="#{overall.priceCol}">Cena</th>
                <th th:text="#{overall.sumCol}">Suma</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="item : ${orderItems}">
                <td>
                    <div class="product">
                        <img th:src="@{${item.product.previewImageUrl}}" alt="product">
                        <span th:text="${item.product.name}"></span>
                    </div>
                </td>
                <td th:text="${item.quantity}"></td>
                <td class="price" th:text="${item.product.price} + ' zł'"></td>
                <td class="price"
                    th:text="${item.product.price * item.quantity} + ' zł'"></td>
            </tr>
            </tbody>
        </table>

        <div class="total-box">
            <p th:text="#{overall.total}"></p> <span th:text="${order.totalPrice} + ' zł'"></span>
        </div>
    </div>

    <!-- ===== ADDRESS ===== -->
    <div class="section">
        <h3 th:text="#{overall.address}">📦 Adres dostawy</h3>
        <div class="address-box" th:text="${address}"></div>
    </div>

    <!-- ===== PAYMENT ===== -->
    <div class="pay-box">
        <button class="btn-pay" id="payBtn" th:text="#{overall.submit}">
            Zapłać bezpiecznie przez Stripe
        </button>
        <div class="secure">
            🔒 Bezpieczna płatność • Karta / Apple Pay / Google Pay
        </div>
    </div>
</div>
</main>

<footer class="footer">
    <p th:text="#{page.copyright}"></p>
</footer>

<script>
    const stripe = Stripe('[[${stripePublicKey}]]');

    document.getElementById("payBtn").addEventListener("click", async () => {
        const response = await fetch("/stripe/create-session", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                orderId: [[${orderId}]]
            })
        });

        const session = await response.json();
        stripe.redirectToCheckout({ sessionId: session.id });
    });
</script>
<script th:src="@{/js/mobile-nav.js}"></script>
</body>
</html>
