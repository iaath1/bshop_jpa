<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Подтверждение аккаунта - MyStore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/store.css}">
</head>

<body>

<header class="header">
    <div class="container header-inner">
        <div class="logo">🛍 MyStore</div>

        <button class="nav-toggle" th:attr="aria-label=#{page.menu}" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>

        <nav class="nav">
            <div class="lang-switcher">
                <div class="dropdown">
                    <button class="dropbtn">
                        🌐 <span th:text="${#locale.language == 'uk' ? 'UA' : #locale.language.toUpperCase()}">PL</span>
                    </button>
                    <div class="dropdown-content">
                        <a href="#" onclick="changeLanguage('uk'); return false;">UA</a>
                        <a href="#" onclick="changeLanguage('pl'); return false;">PL</a>
                    </div>
                </div>
            </div>

            <a th:href="@{/}" th:text="#{page.home}">Главная</a>
            <a th:href="@{/store}" th:text="#{page.catalog}">Каталог</a>
            <a th:href="@{/about}" th:text="#{page.about}">О нас</a>
            <a th:href="@{/contacts}" th:text="#{page.contacts}">Контакты</a>

            <a sec:authorize="isAuthenticated()" th:href="@{/store/cart}" th:text="#{page.cart}">Корзина</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/order/myorders}" th:text="#{page.myOrdersPage}">Мои заказы</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/auth/logout}" method="post" style="display:inline;">
                <button class="btn-small danger" type="submit" th:text="#{page.logout}">Выйти</button>
            </form>

            <a sec:authorize="isAnonymous()" th:href="@{/login}" th:text="#{page.login}">Войти</a>
        </nav>
    </div>
</header>


<main class="auth-body">

    <div class="auth-container">

        <h2 th:text="#{forgetPassword.verifyTitle}">Подтверждение email</h2>

        <p style="text-align:center; font-size:14px;" th:text="#{forgetPassword.verifySent}">
            
        </p>
        <strong th:text="${email}"></strong>

        <form th:action="@{/auth/password-forget-verify}" method="post" class="auth-form">

            <input type="hidden" name="email" th:value="${email}">

            <label for="code" th:text="#{forgetPassword.verificationCode}">Код подтверждения</label>

            <input
                    type="text"
                    id="code"
                    name="code"
                    maxlength="6"
                    placeholder="123456"
                    required
            >

            <p th:if="${error}" th:text="${error}" class="error"></p>

            <button type="submit" class="btn-auth" th:text="#{forgetPassword.verificationSubmit}">
                Подтвердить
            </button>

        </form>

        <p class="auth-text" th:text="#{forgetPassword.verificationResend}">

            

            

        </p>
        <a th:href="@{/resend-code(email=${email})}" th:text="#{forgetPassword.verificationResendLink}">
                Отправить снова
            </a>

    </div>

</main>


<footer class="footer">
    <p th:text="#{page.copyright}"></p>
</footer>
<script th:src="@{/js/mobile-nav.js}"></script>
</body>
</html>
