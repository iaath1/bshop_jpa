<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Корзина - MyStore</title>
    <link rel="stylesheet" th:href="@{/css/store.css}">
</head>
<body>
<header class="header">
    <div class="container header-inner">
        <div class="logo">🛍 MyStore</div>
        <nav class="nav">
            <a th:href="@{/}">Главная</a>
            <a th:href="@{/catalog}">Каталог</a>
            <a th:href="@{/cart}" class="active">Корзина</a>
            <a th:href="@{/contacts}">Контакты</a>
        </nav>
    </div>
</header>

<main class="container cart-page">
    <h2 class="page-title">🛒 Ваша корзина</h2>

    <!-- Если корзина пуста -->
    <div th:if="${#lists.isEmpty(cartItems)}" class="cart-empty">
        <p>Корзина пуста 😔</p>
        <a th:href="@{/catalog}" class="btn">Перейти в каталог</a>
    </div>

    <!-- Если корзина не пуста -->
    <div th:if="${!#lists.isEmpty(cartItems)}" class="cart-content">
        <div class="cart-items">
            <div class="cart-item" th:each="item : ${cartItems}">
                <div class="cart-item-info">
                    <img th:src="@{${item.product.imageUrl}}" alt="Фото" class="cart-thumb">
                    <div class="cart-item-details">
                        <h3 th:text="${item.product.name}" class="cart-item-name"></h3>
                        <p class="cart-item-price" th:text="${item.product.price} + ' ₽'"></p>
                    </div>
                </div>

                <form th:action="@{/store/cart/update}" method="post" class="cart-item-actions">
                    <input type="hidden" name="cartItemId" th:value="${item.id}">
                    <input type="hidden" name="productId" th:value="${item.product.id}">
                    <input type="number" name="quantity" min="1" th:value="${item.quantity}" class="qty-input">
                    <button type="submit" class="btn-small">Обновить</button>
                </form>

                <div class="cart-item-sum">
                    <span th:text="${item.product.price * item.quantity} + ' ₽'"></span>
                </div>

                <form th:action="@{/store/cart/delete/{id}(id=${item.id})}" method="post" class="cart-item-remove">
                    <button type="submit" class="btn-small danger">✖</button>
                </form>
            </div>
        </div>

        <!-- Блок итога -->
        <aside class="cart-summary">
            <h3>Итого</h3>
            <p class="cart-total">
                <span th:text="${total} + ' ₽'"></span>
            </p>
            <a th:href="@{/order/cart}" class="btn btn-primary">Оформить заказ</a>
            <a th:href="@{/catalog}" class="btn btn-secondary">Продолжить покупки</a>
        </aside>
    </div>
</main>

<footer class="footer">
    <p>© 2025 MyStore. Все права защищены.</p>
</footer>
</body>
</html>
