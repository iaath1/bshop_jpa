<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin - Users</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <button class="sidebar-toggle" aria-label="Меню">
    <span></span><span></span><span></span>
</button>
<div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">🧭 Admin</div>
        <nav class="nav">
            <a th:href="@{/admin}" th:classappend="${activePage}=='dashboard' ? ' active'">🏠 Dashboard</a>
            <a th:href="@{/admin/users}" th:classappend="${activePage}=='users' ? ' active'">👤 Users</a>
            <a th:href="@{/admin/products}" th:classappend="${activePage}=='products' ? ' active'">📦 Products</a>
            <a th:href="@{/admin/orders}" th:classappend="${activePage}=='orders' ? ' active'">🧾 Orders</a>
            <a th:href="@{/admin/categories}" th:classappend="${activePage}=='categories' ? ' active'">🏷️ Categories</a>
            <a th:href="@{/admin/colors}" th:classappend="${activePage}=='colors' ? ' active'">🎨 Colors</a>
            <a th:href="@{/admin/statuses}" th:classappend="${activePage}=='statuses' ? ' active'">📊 Statuses</a>
            <a th:href="@{/admin/sizes}" th:classappend="${activePage}=='sizes' ? ' active'">📏 Sizes</a>
            <a th:href="@{/admin/materials}" th:classappend="${activePage}=='materials' ? ' active'">🧵 Materials</a>
            <a th:href="@{/admin/roles}" th:classappend="${activePage}=='roles' ? ' active'">🛡️ Roles</a>
        </nav>
    </aside>
    <!-- Main -->
    <main class="main">
        <div class="topbar">
            <h1 style="margin:0" th:text="#{admin.materialsTitle}">Материалы</h1>
            <div class="top-right">
                <div class="lang-switcher">
                    <div class="dropdown">
                        <button class="dropbtn">
                            🌐 <span th:text="${#locale.language.toUpperCase()}">UA</span>
                        </button>
                        <div class="dropdown-content">
                            <a th:href="@{${currentUrl}(lang='uk')}">UA</a>
                            <a th:href="@{${currentUrl}(lang='pl')}">PL</a>
                        </div>
                    </div>
            </div>
                <span class="muted">👤 <span sec:authentication="name">Admin</span></span>
                <form th:action="@{/auth/logout}" method="post">
                    <button class="btn" type="submit" th:text="#{admin.logout}">Выйти</button>
                </form>
            </div>
        </div>

        <!-- Users Table -->
        <section class="panel">
            <h3 th:text="#{admin.materials}">Все материалы</h3>
            <section class="panel" style="margin-top: 20px;">
            <h3 th:text="#{admin.createMaterial}">➕ Создать новый материал</h3>
            <form th:action="@{/admin/materials/add}" th:object="${newMaterial}" method="post" class="form">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="nameUa" th:text="#{admin.materialNameUA}">Название материала:</label>
                    <input type="text" id="name" th:field="*{nameUa}" th:placeholder="#{admin.materialNamePlaceholder}" required>

                    <label for="namePl" th:text="#{admin.materialNamePL}">Название материала:</label>
                    <input type="text" id="name" th:field="*{namePl}" th:placeholder="#{admin.materialNamePlaceholder}" required>
                </div>
                <button type="submit" class="btn" th:text="#{admin.create}">Создать</button>
            </form>
        </section>
            <table>
                <thead>
                <tr>
                    <th th:text="#{admin.materialNameUA}">Имя</th>
                    <th th:text="#{admin.materialNamePL}">Имя</th>
                    <th th:text="#{admin.materialProducts}">Общее количество товаров</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="material : ${materials}">
                    <td th:text="${material.nameUa}"></td>
                    <td th:text="${material.namePl}"></td>
                    <td th:text="${material.count}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(materials)}">
                    <td colspan="5" class="muted" th:text="#{admin.noData}">Нет данных</td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
<script th:src="@{/js/mobile-nav.js}"></script>
</body>
</html>
