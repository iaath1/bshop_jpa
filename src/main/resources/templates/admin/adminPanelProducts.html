<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin - Products</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">🧭 Admin</div>
        <nav class="nav">
            <a th:href="@{/admin}" th:classappend="${activePage}=='dashboard' ? ' active'">🏠 Dashboard</a>
            <a th:href="@{/admin/users}" th:classappend="${activePage}=='users' ? ' active'">👤 Users</a>
            <a th:href="@{/admin/products}" th:classappend="${activePage}=='products' ? ' active'">📦 Products</a>
            <a th:href="@{/admin/orders}" th:classappend="${activePage}=='orders' ? ' active'">🧾 Orders</a>
            <a th:href="@{/admin/categories}" th:classappend="${activePage}=='categories' ? ' active'">🏷️ Categories</a>
            <a th:href="@{/admin/colors}" th:classappend="${activePage}=='colors' ? ' active'">🎨 Colors</a>
            <a th:href="@{/admin/statuses}" th:classappend="${activePage}=='statuses' ? ' active'">📊 Statuses</a>
            <a th:href="@{/admin/sizes}" th:classappend="${activePage}=='sizes' ? ' active'">📏 Sizes</a>
            <a th:href="@{/admin/materials}" th:classappend="${activePage}=='materials' ? ' active'">🧵 Materials</a>
            <a th:href="@{/admin/roles}" th:classappend="${activePage}=='roles' ? ' active'">🛡️ Roles</a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="topbar">
            <h1 style="margin:0" th:text="#{admin.productsTitle}">Товары</h1>
            <div class="top-right">
                <div class="lang-switcher">
                    <div class="dropdown">
                        <button class="dropbtn">
                            🌐 <span th:text="${#locale.language.toUpperCase()}">UA</span>
                        </button>
                        <div class="dropdown-content">
                            <a th:href="@{${currentUrl}(lang='uk')}">UA</a>
                            <a th:href="@{${currentUrl}(lang='pl')}">PL</a>
                        </div>
                    </div>
            </div>
                <span class="muted">👤 <span sec:authentication="name">Admin</span></span>
                <form th:action="@{/auth/logout}" method="post">
                    <button class="btn" type="submit" th:text="#{admin.logout}">Выйти</button>
                </form>
            </div>
        </div>

        <section class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid #eef2f7;">
        <h3 style="margin:0;" th:text="#{admin.products}">Все товары</h3>
        <a th:href="@{/admin/products/add}" class="btn" th:text="#{admin.createProduct}">➕ Создать</a>
    </div>

     <form th:action="@{/admin/products}" method="get" class="filter-bar">
        <input type="text" name="search"
               th:placeholder="#{filter.searchPlaceholder}"
               th:value="${parameters.search}"
               class="input-search"/>

        <select name="categoryId" class="filter-select">
            <option value="" th:text="#{filter.categories}">Все категории</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:text="${lang == 'uk' ? cat.nameUa : (lang == 'pl' ? cat.namePl : cat.nameUa)}"
                    th:selected="${parameters.categoryId != null and parameters.categoryId == cat.id}">
            </option>
        </select>

        <select name="materialId" class="filter-select">
            <option value="" th:text="#{filter.materials}">Все материалы</option>
            <option th:each="mat : ${materials}"
                    th:value="${mat.id}"
                    th:text="${mat.name}"
                    th:selected="${parameters.materialId != null and parameters.materialId == mat.id}">
            </option>
        </select>

        <select name="colorId" class="filter-select">
            <option value="" th:text="#{filter.colors}">Все цвета</option>
            <option th:each="col : ${colors}"
                    th:value="${col.id}"
                    th:text="${col.name}"
                    th:selected="${parameters.colorId != null and parameters.colorId == col.id}">
            </option>
        </select>

        <select name="sortBy" class="filter-select">
            <option value="name" th:selected="${parameters.sortBy == 'name'}" th:text="#{filter.sortByName}">По названию</option>
            <option value="price" th:selected="${parameters.sortBy == 'price'}" th:text="#{filter.sortByPrice}">По цене</option>
        </select>

        <select name="order" class="filter-select">
            <option value="asc" th:selected="${parameters.order == 'asc'}" th:text="#{filter.orderAsc}">↑ Возрастание</option>
            <option value="desc" th:selected="${parameters.order == 'desc'}" th:text="#{filter.orderDesc}">↓ Убывание</option>
        </select>

        <button type="submit" class="btn btn-filter" th:text="#{filter.apply}">Применить</button>
    </form>

<section class="panel">
    <h3 th:text="#{admin.products}">Все товары</h3>
    <table>
        <thead>
        <tr>
            <th th:text="#{admin.productPhoto}">Фото</th>
            <th th:text="#{admin.productName}">Имя</th>
            <th th:text="#{admin.productDescription}">Описание</th>
            <th th:text="#{admin.productPrice}">Цена</th>
            <th th:text="#{admin.productSizes}">Размеры (и наличие)</th>
            <th th:text="#{admin.productCategory}">Категория</th>
            <th th:text="#{admin.productMaterial}">Материал</th>
            <th th:text="#{admin.productColor}">Цвет</th>
            <th th:text="#{admin.productActions}">Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="prod : ${products}">
            <td>
                <img th:if="${prod.previewImageUrl != null}"
                     th:src="@{${prod.previewImageUrl}}"
                     alt="Фото товара"
                     style="max-width:60px; max-height:60px; object-fit:cover;">
            </td>
            <td th:text="${prod.name}"></td>
            <td th:text="${prod.description}"></td>
            <td th:text="${#numbers.formatDecimal(prod.price, 1, 2)} + ' zł'"></td>

            <!-- ✅ Все размеры товара -->
            <td>
                <div th:if="${#lists.isEmpty(prod.sizes)}" class="muted">—</div>
                <div th:each="size : ${prod.sizes}">
                    <span th:text="${size.name}"></span>
                    (<span th:text="${size.quantity}"></span>)
                </div>
            </td>

            <td th:text="${lang == 'uk' ? prod.category.nameUa : (lang == 'pl' ? prod.category.namePl : prod.category.nameUa)}"></td>
            <td th:text="${prod.material != null ? prod.material.name : '—'}"></td>
            <td>
    <div th:if="${prod.color != null}" style="display: flex; align-items: center; gap: 6px;">
        <div th:style="'width:20px; height:20px; border-radius:50%; border:1px solid #ccc; background-color:' + ${prod.color.hexValue}"></div>
        <span th:text="${prod.color.name}"></span>
    </div>
    <div th:if="${prod.color == null}" class="muted">—</div>
</td>


            <td>
                <a th:href="@{/admin/products/update/{id}(id=${prod.id})}" class="btn btn-small" th:text="#{admin.editProduct}">
                    ✏️ Изменить
                </a>
                <form th:action="@{/admin/products/delete/{id}(id=${prod.id})}"
                      method="post" style="display:inline;">
                    <button type="submit" class="btn btn-small btn-danger"
                            onclick="return confirm('Удалить этот товар?');" th:text="#{admin.deleteProduct}">
                        ❌ Удалить
                    </button>
                </form>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="9" class="muted" th:text="#{admin.noData}">Нет данных</td>
        </tr>
        </tbody>
    </table>
</section>

</section>

    </main>
</div>
</body>
</html>
