<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin - Products</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">🧭 Admin</div>
        <nav class="nav">
            <a th:href="@{/admin}" th:classappend="${activePage}=='dashboard' ? ' active'">🏠 Dashboard</a>
            <a th:href="@{/admin/users}" th:classappend="${activePage}=='users' ? ' active'">👤 Users</a>
            <a th:href="@{/admin/products}" th:classappend="${activePage}=='products' ? ' active'">📦 Products</a>
            <a th:href="@{/admin/orders}" th:classappend="${activePage}=='orders' ? ' active'">🧾 Orders</a>
            <a th:href="@{/admin/categories}" th:classappend="${activePage}=='categories' ? ' active'">🏷️ Categories</a>
            <a th:href="@{/admin/colors}" th:classappend="${activePage}=='colors' ? ' active'">🎨 Colors</a>
            <a th:href="@{/admin/statuses}" th:classappend="${activePage}=='statuses' ? ' active'">📊 Statuses</a>
            <a th:href="@{/admin/sizes}" th:classappend="${activePage}=='sizes' ? ' active'">📏 Sizes</a>
            <a th:href="@{/admin/materials}" th:classappend="${activePage}=='materials' ? ' active'">🧵 Materials</a>
            <a th:href="@{/admin/roles}" th:classappend="${activePage}=='roles' ? ' active'">🛡️ Roles</a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="topbar">
            <h1 style="margin:0">Товары</h1>
            <div class="top-right">
                <span class="muted">👤 <span sec:authentication="name">Admin</span></span>
                <form th:action="@{/auth/logout}" method="post">
                    <button class="btn" type="submit">Выйти</button>
                </form>
            </div>
        </div>

        <section class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid #eef2f7;">
        <h3 style="margin:0;">Все товары</h3>
        <a th:href="@{/admin/products/add}" class="btn">➕ Создать</a>
    </div>

    <section class="panel">
    <h3>Все товары</h3>
    <table>
        <thead>
        <tr>
            <th>Фото</th>
            <th>Имя</th>
            <th>Описание</th>
            <th>Цена</th>
            <th>Количество</th>
            <th>Размер</th>
            <th>Категория</th>
            <th>Материал</th>
            <th>Цвет</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="prod : ${products}">
            <td>
                <img th:if="${prod.previewImageUrl != null}"
                     th:src="@{${prod.previewImageUrl}}"
                     alt="Фото товара"
                     style="max-width:60px; max-height:60px; object-fit:cover;">
            </td>
            <td th:text="${prod.name}"></td>
            <td th:text="${prod.description}"></td>
            <td th:text="${prod.price}"></td>
            <td th:text="${prod.quantity}"></td>
            <td th:text="${prod.size != null ? prod.size.name : '—'}"></td>
            <td th:text="${prod.category != null ? prod.category.name : '—'}"></td>
            <td th:text="${prod.material != null ? prod.material.name : '—'}"></td>
            <td th:text="${prod.color != null ? prod.color.name : '—'}"></td>
            <td>
                <a th:href="@{/admin/products/update/{id}(id=${prod.id})}" class="btn btn-small">
                    ✏️ Изменить
                </a>
                <form th:action="@{/admin/products/delete/{id}(id=${prod.id})}" 
                    method="post" style="display:inline;">
                    <button type="submit" class="btn btn-small btn-danger"
                        onclick="return confirm('Удалить этот товар?');">
                        ❌ Удалить
                    </button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="10" class="muted">Нет данных</td>
        </tr>
        </tbody>
    </table>
</section>

</section>

    </main>
</div>
</body>
</html>
