<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin - Users</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">🧭 Admin</div>
        <nav class="nav">
            <a th:href="@{/admin}" th:classappend="${activePage}=='dashboard' ? ' active'">🏠 Dashboard</a>
            <a th:href="@{/admin/users}" th:classappend="${activePage}=='users' ? ' active'">👤 Users</a>
            <a th:href="@{/admin/products}" th:classappend="${activePage}=='products' ? ' active'">📦 Products</a>
            <a th:href="@{/admin/orders}" th:classappend="${activePage}=='orders' ? ' active'">🧾 Orders</a>
            <a th:href="@{/admin/categories}" th:classappend="${activePage}=='categories' ? ' active'">🏷️ Categories</a>
            <a th:href="@{/admin/colors}" th:classappend="${activePage}=='colors' ? ' active'">🎨 Colors</a>
            <a th:href="@{/admin/statuses}" th:classappend="${activePage}=='statuses' ? ' active'">📊 Statuses</a>
            <a th:href="@{/admin/sizes}" th:classappend="${activePage}=='sizes' ? ' active'">📏 Sizes</a>
            <a th:href="@{/admin/materials}" th:classappend="${activePage}=='materials' ? ' active'">🧵 Materials</a>
            <a th:href="@{/admin/roles}" th:classappend="${activePage}=='roles' ? ' active'">🛡️ Roles</a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="topbar">
            <h1 style="margin:0" th:text="#{admin.usersTitle}">Пользователи</h1>
            <div class="top-right">
                <div class="lang-switcher">
                    <div class="dropdown">
                        <button class="dropbtn">
                            🌐 <span th:text="${#locale.language.toUpperCase()}">UA</span>
                        </button>
                        <div class="dropdown-content">
                            <a th:href="@{${currentUrl}(lang='uk')}">UA</a>
                            <a th:href="@{${currentUrl}(lang='pl')}">PL</a>
                        </div>
                    </div>
            </div>
                <span class="muted">👤 <span sec:authentication="name">Admin</span></span>
                <form th:action="@{/auth/logout}" method="post">
                    <button class="btn" type="submit" th:text="#{admin.logout}">Выйти</button>
                </form>
            </div>
        </div>

        <!-- Users Table -->
        <section class="panel">
            <h3 th:text="#{admin.users}">Все пользователи</h3>
            <table>
                <thead>
                <tr>
                    <th th:text="#{admin.userId}">ID</th>
                    <th th:text="#{admin.userFullname}">Имя</th>
                    <th th:text="#{admin.userEmail}">Email</th>
                    <th th:text="#{admin.userRole}">Роль</th>
                    <th th:text="#{admin.userRegistrationDate}">Дата регистрации</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td>
                        <div class="user-pill">
                            <span th:text="${user.name} + ' ' + ${user.surname}">Имя Фамилия</span>
                        </div>
                    </td>
                    <td class="muted" th:text="${user.email}">email@example.com</td>
                    <td th:text="${user.roleNames}">ROLE_USER</td>
                    <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}">2024-01-01</td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="5" class="muted" th:text="#{admin.noData}">Нет данных</td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>
