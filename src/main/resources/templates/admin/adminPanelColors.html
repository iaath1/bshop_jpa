<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin - Colors</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* добавим лёгкий стиль для отображения цвета */
        .color-box {
            width: 35px;
            height: 35px;
            border-radius: 6px;
            border: 1px solid #ddd;
            box-shadow: 0 0 2px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">🧭 Admin</div>
        <nav class="nav">
            <a th:href="@{/admin}" th:classappend="${activePage}=='dashboard' ? ' active'">🏠 Dashboard</a>
            <a th:href="@{/admin/users}" th:classappend="${activePage}=='users' ? ' active'">👤 Users</a>
            <a th:href="@{/admin/products}" th:classappend="${activePage}=='products' ? ' active'">📦 Products</a>
            <a th:href="@{/admin/orders}" th:classappend="${activePage}=='orders' ? ' active'">🧾 Orders</a>
            <a th:href="@{/admin/categories}" th:classappend="${activePage}=='categories' ? ' active'">🏷️ Categories</a>
            <a th:href="@{/admin/colors}" th:classappend="${activePage}=='colors' ? ' active'">🎨 Colors</a>
            <a th:href="@{/admin/statuses}" th:classappend="${activePage}=='statuses' ? ' active'">📊 Statuses</a>
            <a th:href="@{/admin/sizes}" th:classappend="${activePage}=='sizes' ? ' active'">📏 Sizes</a>
            <a th:href="@{/admin/materials}" th:classappend="${activePage}=='materials' ? ' active'">🧵 Materials</a>
            <a th:href="@{/admin/roles}" th:classappend="${activePage}=='roles' ? ' active'">🛡️ Roles</a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="topbar">
            <h1 style="margin:0">Цвета</h1>
            <div class="top-right">
                <span class="muted">👤 <span sec:authentication="name">Admin</span></span>
                <form th:action="@{/auth/logout}" method="post">
                    <button class="btn" type="submit">Выйти</button>
                </form>
            </div>
        </div>

        <!-- Create Color -->
        <section class="panel" style="margin-top: 20px;">
    <h3>➕ Создать новый цвет</h3>
    <form th:action="@{/admin/colors/add}" method="post" class="form">
        <div class="form-group">
            <label for="name">Название цвета:</label>
            <input type="text" id="name" name="name" placeholder="Введите название..." required>
        </div>

        <div class="form-group">
            <label for="colorPicker">Выберите цвет:</label>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="color" id="colorPicker" name="hexValue" value="#ffffff"
                       style="width: 60px; height: 40px; border: none; background: none; cursor: pointer;">
                <div id="colorPreview"
                     style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid #ccc; background-color: #ffffff;">
                </div>
            </div>
        </div>

        <button type="submit" class="btn">Создать</button>
    </form>
</section>

<script>
    const colorInput = document.getElementById("colorPicker");
    const preview = document.getElementById("colorPreview");

    colorInput.addEventListener("input", function () {
        preview.style.backgroundColor = this.value;
    });
</script>


        <!-- Color list -->
        <section class="panel" style="margin-top: 20px;">
            <h3>🎨 Все цвета</h3>
            <table>
                <thead>
                <tr>
                    <th>Цвет</th>
                    <th>Название</th>
                    <th>HEX</th>
                    <th>Количество товаров</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="color : ${colors}">
                    <td>
                        <div class="color-box" th:style="'background-color:' + ${color.hexValue}"></div>
                    </td>
                    <td th:text="${color.name}"></td>
                    <td th:text="${color.hexValue}"></td>
                    <td th:text="${color.count}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(colors)}">
                    <td colspan="4" class="muted">Нет данных</td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>
